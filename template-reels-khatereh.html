<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تمپلیت ریلز غمگین — خاطره محو</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1b1613;
    --paper:#2a2320;
    --line:#443831;
    --ink:#ece2d6;
    --ink-dim:#9c8d80;
    --rust:#a97a5c;
    --rust-glow:#cf9c73;
    --dust:#d8c6ab;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:#0d0a08;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Vazirmatn', sans-serif;
    padding:24px;
  }

  .phone{
    position:relative;
    width:360px;
    height:720px;
    border-radius:34px;
    overflow:hidden;
    background:
      radial-gradient(ellipse 480px 260px at 50% 0%, rgba(169,122,92,0.14), transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, #100c0a 100%);
    box-shadow: 0 0 0 8px #000, 0 30px 80px rgba(0,0,0,0.7);
    color:var(--ink);
  }

  /* film grain / dust */
  .grain{
    position:absolute; inset:0;
    background-image:
      radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    background-position: 0 0, 2px 2px;
    mix-blend-mode:overlay;
    opacity:0.5;
    pointer-events:none;
    z-index:3;
  }

  .scratches{
    position:absolute; inset:0;
    pointer-events:none;
    z-index:3;
    opacity:0.25;
  }
  .scratch{
    position:absolute;
    top:0;
    width:1px;
    height:100%;
    background:rgba(255,255,255,0.5);
    animation:flicker 4s infinite;
  }
  @keyframes flicker{
    0%,94%,100%{opacity:0;}
    95%,97%{opacity:0.6;}
  }

  .content{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:56px 26px 26px;
  }

  /* polaroid */
  .polaroid{
    width:220px;
    background:#efe6d8;
    padding:12px 12px 34px;
    border-radius:2px;
    transform:rotate(-2deg);
    box-shadow:0 18px 40px rgba(0,0,0,0.55);
    margin-bottom:22px;
    position:relative;
  }
  .polaroid::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:2px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .frame{
    width:100%;
    aspect-ratio:1/1;
    background:
      radial-gradient(ellipse at 50% 35%, rgba(233,220,196,0.9), rgba(120,100,80,0.5) 70%),
      linear-gradient(180deg,#8a7a63,#2a2119);
    filter:sepia(0.35) contrast(0.9) brightness(0.85);
    position:relative;
    overflow:hidden;
  }
  .silhouette{
    position:absolute;
    bottom:0; left:50%;
    transform:translateX(-50%);
    width:60%;
    height:72%;
    background:radial-gradient(ellipse at 50% 0%, rgba(20,15,12,0.85), transparent 70%),
      linear-gradient(180deg, rgba(20,15,12,0.9), rgba(20,15,12,0.6));
    border-radius:50% 50% 20% 20%/60% 60% 20% 20%;
    opacity:0.85;
    filter: blur(1px);
  }
  .caption-strip{
    text-align:center;
    padding-top:10px;
    font-family:'EB Garamond', serif;
    font-style:italic;
    font-size:13px;
    color:#4b3f34;
  }

  .quote{
    font-family:'EB Garamond', serif;
    font-style:italic;
    font-size:18px;
    line-height:1.85;
    color:#d9c9b4;
    text-align:center;
    max-width:280px;
    margin-bottom:8px;
  }
  .quote span{ color:var(--rust-glow); }

  .sub{
    font-size:12px;
    color:var(--ink-dim);
    margin-bottom:26px;
  }

  .timer{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .box{
    width:44px;
    height:54px;
    border:1px solid var(--line);
    border-radius:3px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:19px;
    font-weight:500;
    color:var(--ink);
    font-family:'EB Garamond', serif;
  }
  .label{
    font-size:10px;
    color:var(--ink-dim);
    letter-spacing:0.5px;
  }

  .caption{
    font-size:11.5px;
    color:var(--ink-dim);
    margin-top:6px;
    margin-bottom:auto;
    text-align:center;
    line-height:1.8;
  }

  /* film reel scrub bar */
  .scrub-row{
    width:100%;
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:18px;
  }
  .play{
    width:32px; height:32px;
    border-radius:50%;
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .play::before{
    content:"";
    border-style:solid;
    border-width:6px 0 6px 9px;
    border-color:transparent transparent transparent var(--dust);
    margin-right:-2px;
  }
  .scrub{
    flex:1;
    height:3px;
    border-radius:3px;
    background:var(--line);
    position:relative;
    overflow:hidden;
  }
  .scrub-fill{
    position:absolute;
    right:0; top:0; bottom:0;
    width:41%;
    background:linear-gradient(90deg, var(--rust), var(--rust-glow));
    border-radius:3px;
  }
  .time-tag{
    font-size:10px;
    color:var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }

  .brand{
    margin-top:16px;
    font-size:10px;
    color:#5b4f43;
    letter-spacing:1.5px;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="grain"></div>
  <div class="scratches" id="scratches"></div>

  <div class="content">
    <div class="polaroid">
      <div class="frame"><div class="silhouette"></div></div>
      <div class="caption-strip">تابستون ۱۴۰۱</div>
    </div>

    <div class="quote">عکسا رنگ‌شون رفته، ولی <span>دلتنگی</span> هنوز تازه‌ست</div>
    <div class="sub">۴۱۲ روز از آخرین باری که دیدمت</div>

    <div class="timer">
      <div class="unit"><div class="box">۱۳</div><div class="label">ماه</div></div>
      <div class="unit"><div class="box">۰۷</div><div class="label">روز</div></div>
      <div class="unit"><div class="box">۰۳</div><div class="label">ساعت</div></div>
      <div class="unit"><div class="box">۵۱</div><div class="label">دقیقه</div></div>
      <div class="unit"><div class="box">۲۶</div><div class="label">ثانیه</div></div>
    </div>

    <div class="caption">این قاب رو نگه‌دار<br>برای روزی که یاد کسی بیفتی</div>

    <div class="scrub-row">
      <div class="play"></div>
      <div class="scrub"><div class="scrub-fill"></div></div>
      <div class="time-tag">۰۰:۱۲ / ۰۰:۳۰</div>
    </div>

    <div class="brand">قالب ریلز · آلبوم خاطرات</div>
  </div>
</div>

<script>
  const wrap = document.getElementById('scratches');
  for(let i=0;i<5;i++){
    const s = document.createElement('div');
    s.className = 'scratch';
    s.style.left = (Math.random()*100) + '%';
    s.style.animationDelay = (Math.random()*4) + 's';
    wrap.appendChild(s);
  }
</script>

</body>
</html>
